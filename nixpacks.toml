# Nixpacks usa esto para entender que es un proyecto Node con el server en backend/.
# Sin esto, podría confundirse por el package.json del root (que es para Vercel).

[phases.setup]
nixPkgs = ["nodejs-20_x", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["cd backend && npm ci --omit=dev"]

[phases.build]
cmds = ["echo 'Backend listo'"]

[start]
cmd = "cd backend && node server.js"
