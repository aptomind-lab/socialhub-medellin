# Nixpacks: el backend Node vive en /backend.
# Forzamos los comandos para que NO se confunda con el package.json del root.
# better-sqlite3 requiere compilar binarios nativos → python3 + gcc + make.

providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20", "python3", "gcc", "gnumake"]

[phases.install]
cmds = ["cd backend && npm ci --omit=dev"]

[phases.build]
cmds = ["echo 'Frontends son estáticos — sin build step.'"]

[start]
# Cargamos /root/.profile para exponer las libs nativas que better-sqlite3 necesita
# (Nixpacks compila el binding contra paths del Nix store y .profile los pone en LD_LIBRARY_PATH).
cmd = "bash -lc 'source /root/.profile && cd backend && node server.js'"
